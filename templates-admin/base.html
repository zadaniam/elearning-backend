<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning Admin</title>
    
    <<!-- 1. Memanggil Pemaket Tailwind CSS Lokal Anda -->
    <link href="{{ url_for('static', path='output.css') }}" rel="stylesheet">
    
    <!-- 2. Memanggil Mesin HTMX Lokal yang Baru Saja Sukses Anda Install -->
    <script src="{{ url_for('static', path='htmx.min.js') }}"></script>
    
</head>

<body class="bg-slate-50 font-sans antialiased text-slate-800">

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR NAVIGASI -->
        <aside class="w-64 bg-slate-900 text-slate-200 flex flex-col justify-between shadow-xl">
            <div>
                <div class="p-6 border-b border-slate-800 flex items-center space-x-3">
                    <span class="text-2xl">✨</span>
                    <h1 class="text-xl font-bold tracking-tight text-white">BisnisAnda</h1>
                </div>
                
                <nav class="p-4 space-y-1.5 flex-1">
                    <a href="/admin/dashboard" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition duration-200 hover:bg-slate-800 hover:text-white bg-blue-600 text-white shadow-md shadow-blue-900/30">
                        <span>📊</span>
                        <span class="font-medium text-sm">Dashboard</span>
                    </a>
                    <a href="/admin/users" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition duration-200 hover:bg-slate-800 hover:text-white">
                        <span>👥</span>
                        <span class="font-medium text-sm">Pengguna</span>
                    </a>
                    <a href="/admin/materi" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition duration-200 hover:bg-slate-800 hover:text-white">
                        <span>📚</span>
                        <span class="font-medium text-sm">Video Materi</span>
                    </a>
                </nav>
            </div>
            
            <div class="p-4 border-t border-slate-800 bg-slate-950/40">
                <p class="text-xs font-semibold text-white">Administrator</p>
            </div>
        </aside>

        <!-- KONTEN UTAMA -->
        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10 shadow-sm shadow-slate-100">
                <h2 class="text-lg font-semibold text-slate-800">🎯 Pengelolaan Sistem E-Learning</h2>
                <div class="flex items-center space-x-2 text-xs font-medium text-green-700 bg-green-50 px-3 py-1.5 rounded-full border border-green-200">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span>Backend FastAPI Terhubung</span>
                </div>
            </header>

            <!-- Wadah Pengisian Konten Dinamis -->
            <div class="p-8 max-w-7xl w-full mx-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
        
    </div>

</body>
</html>
